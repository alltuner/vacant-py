name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild and publish (e.g. v0.3.3). Leave blank to defer to release-please."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        if: github.event_name != 'workflow_dispatch' || inputs.tag == ''
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-tag:
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
    steps:
      - id: pick
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          RP_CREATED: ${{ needs.release-please.outputs.release_created }}
          RP_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$RP_CREATED" = "true" ]; then
            echo "tag=$RP_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "no tag to build; downstream jobs will be skipped"
          fi

  build-linux:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: 2_28
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  build-macos:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    needs: [resolve-tag, build-linux, build-macos, sdist]
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
